name: release-dryrun

on:
    push:
        tags:
            - "v*.*.*-rc.*"

jobs:
    dryrun:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4

            - uses: dtolnay/rust-toolchain@stable

            - uses: Swatinem/rust-cache@v2

            - name: Test
              run: cargo test

            - name: Check tag matches Cargo.toml version (allow -rc.*)
              shell: bash
              run: |
                  set -euo pipefail
                  tag="${GITHUB_REF_NAME#v}"        # e.g. 0.1.1-rc.1
                  tag_base="${tag%%-rc.*}"          # 0.1.1
                  ver="$(grep -m1 '^version\s*=' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
                  test "$tag_base" = "$ver" || { echo "tag_base=$tag_base != version=$ver"; exit 1; }

            - name: Cargo publish dry-run
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
              run: cargo publish --dry-run
