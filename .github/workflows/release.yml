name: release

on:
    push:
        tags:
            - "v[0-9]*.[0-9]*.[0-9]*"

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # needed to verify tag is on main

            - uses: dtolnay/rust-toolchain@stable
            - uses: Swatinem/rust-cache@v2

            - name: Test
              run: cargo test

            - name: Verify tag is strict semver and on main, and matches Cargo.toml
              shell: bash
              run: |
                  set -euo pipefail
                  tag="${GITHUB_REF_NAME}"

                  # 1) strict tag format: vMAJOR.MINOR.PATCH, digits only
                  [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "invalid tag: $tag"; exit 1; }

                  # 2) tag must point to a commit reachable from origin/main
                  git fetch --no-tags origin main
                  commit="$(git rev-list -n 1 "$tag")"
                  git merge-base --is-ancestor "$commit" "origin/main" || {
                    echo "tag $tag commit $commit is not on origin/main"
                    exit 1
                  }

                  # 3) tag version must match Cargo.toml version
                  tag_ver="${tag#v}"
                  ver="$(grep -m1 '^version\s*=' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
                  [[ "$tag_ver" = "$ver" ]] || { echo "tag=$tag_ver != version=$ver"; exit 1; }

            - name: Publish to crates.io
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
              run: cargo publish --locked
